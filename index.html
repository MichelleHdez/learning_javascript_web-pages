  <body>
    <h1>Changing text in based on some images</h1>

    <div id = "message">
      Hover over an image to display the alt text.

    alt="My first cactus"
    src="images\UEPC5878.JPG"

    alt="My first photo of a bee"
    src="images\USIS4689.JPG"
